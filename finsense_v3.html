<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ФинСенс v3</title>
  <style>
    :root {
      --red:#ef3124; --red-d:#d72505; --red-soft:rgba(239,49,36,.08);
      --bg:#f2f3f5; --surface:#ffffff; --text:#121213; --text-2:#6d6d6d; --text-3:#a0a1a9;
      --green:#2fc26e; --orange:#f5a623; --blue:#4da6ff; --purple:#9b7fe8;
      --r-s:8px; --r-m:12px; --r-l:16px; --r-xl:20px;
      --font:'Alfa Interface Sans','Styrene UI',system-ui,-apple-system,'Segoe UI',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);background:#c8c8c8;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:24px 16px;-webkit-font-smoothing:antialiased}
    .phone{width:375px;height:812px;background:var(--bg);border-radius:44px;overflow:hidden;box-shadow:0 32px 96px rgba(0,0,0,.28),0 0 0 1px rgba(0,0,0,.08);display:flex;flex-direction:column;position:relative}
    .statusbar{background:var(--red);padding:14px 24px 0;display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:rgba(255,255,255,.9)}
    .hdr-analytics{background:var(--red);padding:10px 20px 16px;color:white}
    .hdr-logo{display:flex;align-items:center;gap:8px}
    .hdr-mark{width:28px;height:28px;background:white;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:var(--red)}
    .hdr-name{font-size:18px;font-weight:800;letter-spacing:-.3px}
    .hdr-sub{font-size:11px;opacity:.72;margin-top:2px;padding-left:36px}
    .hdr-upload-btn{margin-left:auto;background:rgba(255,255,255,.18);border:none;border-radius:8px;padding:4px 9px;font-size:11px;font-weight:600;color:rgba(255,255,255,.9);cursor:pointer;font-family:var(--font);transition:background .15s;white-space:nowrap}
    .hdr-upload-btn:hover{background:rgba(255,255,255,.28)}
    .hdr-upload-btn.loaded{background:rgba(47,194,110,.35);color:#7fff9e}
    .hdr-chat{background:var(--red);padding:10px 16px 14px;display:flex;align-items:center;gap:10px}
    .chat-avatar{width:38px;height:38px;background:white;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:var(--red);flex-shrink:0}
    .chat-hdr-name{font-size:16px;font-weight:800;color:white}
    .chat-hdr-sub{font-size:11px;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:4px;margin-top:1px}
    .status-dot{width:6px;height:6px;background:#7fff9e;border-radius:50%}
    .privacy-pill{margin-left:auto;background:rgba(255,255,255,.15);border-radius:8px;padding:4px 9px;font-size:10px;color:rgba(255,255,255,.8);font-weight:600}
    .content{flex:1;overflow-y:auto;min-height:0}
    .content::-webkit-scrollbar{display:none}
    .screen{display:none;height:100%}
    .screen.active{display:flex;flex-direction:column}
    .analytics-scroll{flex:1;overflow-y:auto;padding:14px 14px 10px}
    .analytics-scroll::-webkit-scrollbar{display:none}
    .bottom-nav{background:white;border-top:1px solid rgba(0,0,0,.07);display:flex;padding:10px 0 22px;flex-shrink:0}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;font-family:var(--font);font-size:10px;font-weight:600;color:var(--text-3);transition:color .15s;padding:0}
    .nav-btn.active{color:var(--red)}
    .nav-icon{font-size:22px;line-height:1}
    .card{background:white;border-radius:var(--r-l);padding:15px;margin-bottom:11px}
    .card-label{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text-3);margin-bottom:12px}
    .hero-amt{font-size:36px;font-weight:800;color:var(--text);letter-spacing:-1.4px;line-height:1}
    .hero-sub{font-size:13px;color:var(--text-2);margin-top:4px}
    .pill{display:inline-block;background:var(--bg);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--text-3);margin-top:7px}
    .stat-row{display:flex;gap:10px;margin-bottom:11px}
    .stat-box{flex:1;background:var(--bg);border-radius:var(--r-m);padding:12px}
    .stat-val{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.5px}
    .stat-val.red{color:var(--red)} .stat-val.green{color:var(--green)}
    .stat-lbl{font-size:11px;color:var(--text-2);margin-top:3px;line-height:1.3}
    .cat-item{display:flex;align-items:center;gap:11px;margin-bottom:12px}
    .cat-item:last-child{margin-bottom:0}
    .cat-icon{width:37px;height:37px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .cat-body{flex:1}
    .cat-name{font-size:13px;font-weight:500;color:var(--text)}
    .cat-track{height:4px;background:var(--bg);border-radius:2px;margin-top:5px;overflow:hidden}
    .cat-fill{height:100%;border-radius:2px}
    .cat-amt{font-size:13px;font-weight:700;color:var(--text);flex-shrink:0}
    .ai-block{background:linear-gradient(140deg,#1a1a1e 0%,#27272c 100%);border-radius:var(--r-l);padding:14px;margin-bottom:11px}
    .ai-block-hdr{display:flex;align-items:center;gap:7px;margin-bottom:10px}
    .ai-pulse{width:7px;height:7px;background:var(--red);border-radius:50%;animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
    .ai-block-title{font-size:13px;font-weight:700;color:rgba(255,255,255,.85)}
    .ai-bubble{background:rgba(255,255,255,.07);border-radius:11px 11px 11px 3px;padding:10px 12px;margin-bottom:10px}
    .ai-text{font-size:13px;color:rgba(255,255,255,.88);line-height:1.55}
    .ai-chips{display:flex;flex-wrap:wrap;gap:6px}
    .ai-chip{background:rgba(239,49,36,.22);color:#ff9f9a;border:none;padding:6px 11px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:background .15s}
    .ai-chip:hover{background:rgba(239,49,36,.35)}
    .alert-card{background:linear-gradient(140deg,#fff5f5,#fff);border:1.5px solid rgba(239,49,36,.12);border-radius:var(--r-l);padding:15px;margin-bottom:11px}
    .ai-badge{display:inline-flex;align-items:center;gap:4px;background:var(--red-soft);color:var(--red);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:800;margin-bottom:10px}
    .alert-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:5px}
    .alert-big{font-size:40px;font-weight:900;color:var(--red);letter-spacing:-2px;line-height:1;margin:3px 0 6px}
    .alert-text{font-size:13px;color:var(--text-2);line-height:1.55}
    .pat-item{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid var(--bg)}
    .pat-item:last-child{border-bottom:none}
    .pat-icon{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
    .pat-info{flex:1}
    .pat-title{font-size:14px;font-weight:700;color:var(--text)}
    .pat-desc{font-size:12px;color:var(--text-2);margin-top:2px;line-height:1.4}
    .pat-right{text-align:right;flex-shrink:0}
    .pat-amt{font-size:15px;font-weight:800;color:var(--text)}
    .tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;margin-top:4px}
    .tag-imp{background:rgba(239,49,36,.1);color:var(--red)}
    .tag-hab{background:rgba(245,166,35,.12);color:#b87000}
    .tag-once{background:var(--bg);color:var(--text-2)}
    .tx-item{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--bg)}
    .tx-item:last-child{border-bottom:none}
    .tx-icon{width:39px;height:39px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
    .tx-name{font-size:14px;font-weight:500;color:var(--text)}
    .tx-meta{font-size:11px;color:var(--text-3);margin-top:2px}
    .tx-amt{margin-left:auto;font-size:14px;font-weight:700;flex-shrink:0}
    .donut-wrap{display:flex;justify-content:center;margin:4px 0 14px}
    .leg-item{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--bg)}
    .leg-item:last-child{border-bottom:none}
    .leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .leg-lbl{font-size:13px;color:var(--text-2);flex:1}
    .leg-val{font-size:13px;font-weight:700;color:var(--text)}
    .leg-pct{font-size:11px;color:var(--text-3);margin-left:4px}
    .callout{border-radius:var(--r-m);padding:10px 11px;margin-bottom:7px;display:flex;align-items:flex-start;gap:8px}
    .callout:last-child{margin-bottom:0}
    .callout.good{background:rgba(47,194,110,.08)}
    .callout.warn{background:rgba(245,166,35,.08)}
    .callout.bad{background:rgba(239,49,36,.06)}
    .callout-text{font-size:13px;color:var(--text);line-height:1.5}
    /* Upload zone */
    .upload-zone{background:white;border:2px dashed rgba(239,49,36,.3);border-radius:var(--r-l);padding:20px 15px;margin-bottom:11px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
    .upload-zone:hover{border-color:var(--red);background:var(--red-soft)}
    .upload-icon{font-size:32px;margin-bottom:8px}
    .upload-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
    .upload-sub{font-size:12px;color:var(--text-3)}
    .upload-formats{display:flex;gap:6px;justify-content:center;margin-top:10px}
    .fmt-badge{background:var(--bg);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;color:var(--text-2)}
    /* Chat */
    .chat-screen{display:none;flex-direction:column;height:100%}
    .chat-screen.active{display:flex}
    .chat-msgs{flex:1;overflow-y:auto;padding:12px 13px 6px;display:flex;flex-direction:column;gap:9px;min-height:0}
    .chat-msgs::-webkit-scrollbar{display:none}
    .msg-row{display:flex;flex-direction:column;opacity:0;transform:translateY(8px);animation:msgIn .28s ease forwards}
    @keyframes msgIn{to{opacity:1;transform:translateY(0)}}
    .msg-row.user{align-items:flex-end}
    .msg-row.ai{align-items:flex-start}
    .bubble{max-width:84%;padding:10px 13px;border-radius:var(--r-l);font-size:14px;line-height:1.5}
    .msg-row.user .bubble{background:var(--red);color:white;border-bottom-right-radius:4px}
    .msg-row.ai .bubble{background:white;color:var(--text);border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .msg-time{font-size:10px;color:var(--text-3);margin-top:3px;padding:0 3px}
    .date-div{text-align:center;font-size:11px;color:var(--text-3);font-weight:600}
    .chart-card{background:var(--bg);border-radius:var(--r-m);padding:11px;margin-top:9px}
    .chart-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);margin-bottom:9px}
    .hb-item{margin-bottom:9px}
    .hb-item:last-child{margin-bottom:0}
    .hb-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
    .hb-row span:first-child{color:var(--text);font-weight:500}
    .hb-row span:last-child{color:var(--text-2);font-weight:600}
    .hb-track{height:6px;background:rgba(0,0,0,.07);border-radius:3px;overflow:hidden}
    .hb-fill{height:100%;border-radius:3px}
    .hb-pct{font-size:10px;color:var(--text-3);margin-top:2px}
    .tl-item{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid rgba(0,0,0,.06)}
    .tl-item:last-child{border-bottom:none}
    .tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .tl-info{flex:1}
    .tl-name{font-size:12px;font-weight:500;color:var(--text)}
    .tl-date{font-size:10px;color:var(--text-3);margin-top:1px}
    .tl-amt{font-size:12px;font-weight:700;color:var(--text);flex-shrink:0}
    .md-wrap{display:flex;align-items:center;gap:10px}
    .md-leg{flex:1}
    .md-row{display:flex;align-items:center;gap:5px;margin-bottom:4px;font-size:11px}
    .md-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .md-lbl{color:var(--text-2);flex:1}
    .md-val{font-weight:700;color:var(--text)}
    .sv-row{display:flex;gap:7px;margin-bottom:7px}
    .sv-box{flex:1;border-radius:var(--r-m);padding:9px;text-align:center}
    .sv-lbl{font-size:10px;color:var(--text-3);font-weight:600;text-transform:uppercase;margin-bottom:3px}
    .sv-val{font-size:17px;font-weight:900;letter-spacing:-.5px}
    .day-chart{display:flex;align-items:flex-end;gap:4px;height:56px}
    .day-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
    .day-bar{width:100%;border-radius:4px 4px 0 0}
    .day-name{font-size:10px;color:var(--text-3)}
    .chat-insight{background:var(--red-soft);border-left:3px solid var(--red);border-radius:var(--r-m);padding:9px 10px;margin-top:9px;font-size:12px;color:var(--text);line-height:1.5}
    .ci-lbl{font-size:10px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
    .typing-row .bubble{display:flex;gap:5px;align-items:center;padding:11px 13px}
    .t-dot{width:7px;height:7px;background:var(--text-3);border-radius:50%;animation:td 1.2s ease-in-out infinite}
    .t-dot:nth-child(2){animation-delay:.2s}
    .t-dot:nth-child(3){animation-delay:.4s}
    @keyframes td{0%,60%,100%{transform:scale(1);opacity:.4}30%{transform:scale(1.3);opacity:1}}
    .chips-bar{padding:0 13px 7px;display:flex;flex-wrap:wrap;gap:6px;flex-shrink:0}
    .chip{background:white;border:1.5px solid rgba(239,49,36,.25);color:var(--red);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:background .15s,transform .1s;white-space:nowrap}
    .chip:hover{background:var(--red-soft)}
    .chip:active{transform:scale(.97)}
    .input-row{background:white;border-top:1px solid rgba(0,0,0,.07);padding:9px 13px 22px;display:flex;gap:8px;align-items:center;flex-shrink:0}
    .attach-btn{width:38px;height:38px;background:var(--bg);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:18px;transition:background .15s}
    .attach-btn:hover{background:#e8e9eb}
    .inp{flex:1;background:var(--bg);border:none;border-radius:22px;padding:10px 14px;font-family:var(--font);font-size:14px;color:var(--text);outline:none}
    .inp::placeholder{color:var(--text-3)}
    .send-btn{width:38px;height:38px;background:var(--red);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s}
    .send-btn:hover{background:var(--red-d)}
    .send-btn svg{width:15px;height:15px;fill:white}
  </style>
</head>
<body>
<div class="phone">
  <div class="statusbar" id="statusbar"><span>9:41</span><span style="opacity:.6">●●● ▶ 🔋</span></div>

  <div id="hdr-analytics" class="hdr-analytics">
    <div class="hdr-logo">
      <div class="hdr-mark">Ф</div>
      <div class="hdr-name">ФинСенс</div>
      <button class="hdr-upload-btn" id="hdr-upload-btn" onclick="triggerUpload()" title="Загрузить выписку">📎 Загрузить</button>
    </div>
    <div class="hdr-sub" id="hdr-sub">ИИ-анализ финансового поведения</div>
  </div>
  <div id="hdr-chat" class="hdr-chat" style="display:none">
    <div class="chat-avatar">Ф</div>
    <div>
      <div class="chat-hdr-name">ФинСенс</div>
      <div class="chat-hdr-sub"><div class="status-dot"></div>На устройстве · без сети</div>
    </div>
    <div class="privacy-pill">🔒 Приватно</div>
  </div>

  <div class="content" id="content">
    <div class="screen active" id="s-overview"><div class="analytics-scroll" id="scroll-overview"></div></div>
    <div class="screen" id="s-impulses"><div class="analytics-scroll" id="scroll-impulses"></div></div>
    <div class="screen" id="s-meaning"><div class="analytics-scroll" id="scroll-meaning"></div></div>
    <div class="screen chat-screen" id="s-chat">
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="chips-bar" id="chat-chips"></div>
      <div class="input-row">
        <button class="attach-btn" onclick="triggerUpload()" title="Загрузить выписку">📎</button>
        <input class="inp" id="chat-inp" type="text" placeholder="Спросите что-нибудь...">
        <button class="send-btn" onclick="handleSend()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" id="nb-0" onclick="goTab(0)"><div class="nav-icon">📊</div><div>Обзор</div></button>
    <button class="nav-btn"        id="nb-1" onclick="goTab(1)"><div class="nav-icon">🔍</div><div>Импульсы</div></button>
    <button class="nav-btn"        id="nb-2" onclick="goTab(2)"><div class="nav-icon">💡</div><div>Смысл</div></button>
    <button class="nav-btn"        id="nb-3" onclick="goTab(3)"><div class="nav-icon">💬</div><div>ИИ-чат</div></button>
  </div>
</div>

function fmt(n) { return Math.round(n).toLocaleString('ru'); }

function buildDonut(cats, cx, cy, r, sw, label, sub) {
  const circ = 2 * Math.PI * r;
  let off = 0;
  const segs = cats.map(c => {
    const dash = circ * c.p / 100;
    const s = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${c.c}" stroke-width="${sw}"
      stroke-dasharray="${dash.toFixed(1)} ${(circ - dash).toFixed(1)}"
      stroke-dashoffset="${(-off).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    off += dash;
    return s;
  }).join('');
  const inner = r - sw / 2 - 2;
  return segs +
    `<circle cx="${cx}" cy="${cy}" r="${inner}" fill="white"/>` +
    `<text x="${cx}" y="${cy + 6}" text-anchor="middle" font-size="16" font-weight="900" fill="#121213" font-family="system-ui">${label}</text>` +
    (sub ? `<text x="${cx}" y="${cy + 19}" text-anchor="middle" font-size="10" fill="#a0a1a9" font-family="system-ui">${sub}</text>` : '');
}

function goTab(idx) {
  SCREENS.forEach((id, i) => {
    const el = document.getElementById('s-' + id);
    el.classList.toggle('active', i === idx);
    if (el.classList.contains('chat-screen')) {
      el.style.display = i === idx ? 'flex' : 'none';
      if (i !== idx) el.classList.remove('active');
    }
  });
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i === idx));
  const isChat = idx === 3;
  document.getElementById('hdr-analytics').style.display = isChat ? 'none' : '';
  document.getElementById('hdr-chat').style.display = isChat ? '' : 'none';
  activeTab = idx;
  if (idx === 3 && !chatBooted) { chatBooted = true; setTimeout(bootChat, 100); }
  if (idx < 3) {
    const sc = document.getElementById('s-'+SCREENS[idx]).querySelector('.analytics-scroll');
    if (sc) sc.scrollTop = 0;
  }
}

function goChat(scenario) {
  goTab(3);

function triggerUpload() {
  document.getElementById('file-input').click();
}

function parseRuDate(str) {
  if (!str) return null;
  const s = String(str).trim();
  // DD.MM.YYYY or DD.MM.YYYY HH:MM:SS
  const m1 = s.match(/^(\d{2})\.(\d{2})\.(\d{4})/);
  if (m1) return new Date(+m1[3], +m1[2]-1, +m1[1]);
  // YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return new Date(s.substring(0,10));
  // Excel serial date
  if (/^\d{4,5}$/.test(s)) {
    const d = new Date((+s - 25569) * 86400000);
    if (!isNaN(d)) return d;
  }
  const d = new Date(s);
  return isNaN(d) ? null : d;
}

function fmtDate(d) {
  if (!d) return '—';
  return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + d.getFullYear();
}

function detectCols(headers) {
  const H = headers.map(h => String(h||'').toLowerCase().trim());
  const find = (...terms) => H.findIndex(h => terms.some(t => h.includes(t)));
  return {
    date:     find('operationdate','дата опер','дата совер','дата','date'),
    merchant: find('merchant','получател','описани','назван','торгов','payee'),
    amount:   find('amount','сумм','sum'),
    category: find('category','категори'),
    mcc:      find('mcc'),
    type:     find('type','тип','вид','direction'),
  };
}

function classifyTx(merchant, mcc, category, amount) {
  const m = String(merchant||'').toLowerCase();
  const cat = String(category||'').toLowerCase();
  const mc = parseInt(mcc)||0;

  // Vending — check merchant name first, small amount
  if (/vending|вендинг/i.test(m) && amount <= 400) return { lifeCat:'vending', impulse:true };

  // By merchant name patterns
  if (/strelka|mos.?transport|cppk|метро|metro|мцд|мтк|мтрансп/i.test(m)) return {lifeCat:'transport',impulse:false};
  if (/аптек|aptec|medlab|медлаб|медицин|здоров|pharmacy/i.test(m)) return {lifeCat:'health',impulse:false};
  if (/burger|mcdonald|kfc|stardogs|qsr|cafetera|сказочн|domino|pizza|пицц|subway|вкусно/i.test(m)) return {lifeCat:'fastfood',impulse:true};
  if (/vkusvill|вкусвилл|magnit|магнит|pyaterochka|пятерочк|kuulklever|rumar|fresh.?market|krasnoe.*belo|красное.*бел|dixy|дикси|перекрестк|лент[аы]|ашан|auchan/i.test(m)) return {lifeCat:'food',impulse:false};
  if (/ozon|wildberrie|твой.?дом|ulybka|улыбка.?радуг|икеа|ikea|hoff|леруа|leroy/i.test(m)) return {lifeCat:'home',impulse:false};
  if (/ароматн|aromatn|алкоголь|wine.*shop|pivo/i.test(m)) return {lifeCat:'alcohol',impulse:true};
  if (/альфа.?смарт|комиссия.*обслуж/i.test(m)) return {lifeCat:'fees',impulse:false};

  // By MCC
  if ([4111,4131,4011,7523,4112].includes(mc)) return {lifeCat:'transport',impulse:false};
  if ([5912,8099,8011,8049,8062,8021,8031].includes(mc)) return {lifeCat:'health',impulse:false};
  if ([5411,5412,5441,5422,5451].includes(mc)) return {lifeCat:'food',impulse:false};
  if ([5812,5814,5813].includes(mc)) return {lifeCat:'fastfood',impulse:true};
  if ([5300,5310,5311,5200,5251,5261].includes(mc)) return {lifeCat:'home',impulse:false};
  if ([5921].includes(mc)) return {lifeCat:'alcohol',impulse:true};
  if ([5499].includes(mc)) return {lifeCat:'food',impulse:false};

  // By bank category
  if (/транспорт/i.test(cat)) return {lifeCat:'transport',impulse:false};
  if (/продукт|еда|супер/i.test(cat)) return {lifeCat:'food',impulse:false};
  if (/аптек|здоров|медицин/i.test(cat)) return {lifeCat:'health',impulse:false};
  if (/ресторан|кафе|фастфуд/i.test(cat)) return {lifeCat:'fastfood',impulse:true};
  if (/маркетплейс|интернет.*магаз/i.test(cat)) return {lifeCat:'home',impulse:false};

  return {lifeCat:'other',impulse:false};
}

function computeAnalytics(rows, cols) {
  // Map rows to transactions
  const txs = rows.map(row => ({
    date:     row[cols.date],
    merchant: row[cols.merchant] || '',
    amount:   Math.abs(parseFloat(String(row[cols.amount]||'').replace(',','.').replace(/[^0-9.\\-]/g,''))||0),
    category: cols.category>=0 ? row[cols.category] : '',
    mcc:      cols.mcc>=0 ? row[cols.mcc] : '',
    type:     cols.type>=0 ? row[cols.type] : '',
  }));

  // Filter debits only, exclude huge transfers
  const debits = txs.filter(tx => {
    if (tx.amount <= 0) return false;
    const t = String(tx.type||'').toLowerCase();
    if (/пополнени|credit|зачислени|возврат/i.test(t)) return false;
    if (tx.amount > 100000) return false; // skip large transfers
    return true;
  });

  if (debits.length === 0) return null;

  // Classify
  const classified = debits.map(tx => {
    const cls = classifyTx(tx.merchant, tx.mcc, tx.category, tx.amount);
    return { ...tx, ...cls };
  });

  const total = classified.reduce((s,t) => s+t.amount, 0);

  // Category totals
  const catTotals = {};
  classified.forEach(t => { catTotals[t.lifeCat] = (catTotals[t.lifeCat]||0) + t.amount; });

  const impulseTotal = classified.filter(t => t.impulse).reduce((s,t) => s+t.amount, 0);
  const habitsPct = total > 0 ? Math.round(impulseTotal / total * 100) : 0;

  const necessaryCats = ['food','health','transport'];
  const necessaryTotal = necessaryCats.reduce((s,k) => s+(catTotals[k]||0), 0);
  const necessaryPct = total > 0 ? Math.round(necessaryTotal / total * 100) : 0;

  // Build categories array
  const categories = CAT_DEFS
    .filter(c => (catTotals[c.key]||0) > 0)
    .map(c => ({
      l: c.label, a: Math.round(catTotals[c.key]||0),
      p: Math.round((catTotals[c.key]||0) / total * 100),
      c: c.color, bg: c.bg,
    }))
    .sort((a,b) => b.a - a.a);

  // Habits
  const habitsMap = {
    '🍔 Фастфуд':       { cats:['fastfood'], color:'#f5a623' },
    '🎰 Снеки/вендинг': { cats:['vending'],  color:'#a0a1a9' },
    '🍷 Алкоголь':      { cats:['alcohol'],  color:'#9b7fe8' },
    '🚬 Курение':       { cats:[],           color:'#d2d3d9' },
  };
  const habits = Object.entries(habitsMap).map(([l,{cats,color}]) => ({
    l, c:color,
    a: Math.round(cats.reduce((s,k) => s+(catTotals[k]||0), 0)),
  }));

  // Impulse transactions
  const impulseTxs = classified
    .filter(t => t.impulse)
    .sort((a,b) => b.amount - a.amount)
    .slice(0, 6)
    .map(t => {
      const def = CAT_DEFS.find(c=>c.key===t.lifeCat)||CAT_DEFS[CAT_DEFS.length-1];
      const icons = {fastfood:'🍔',vending:'🎰',alcohol:'🍷'};
      return { icon: icons[t.lifeCat]||'💸', bg: def.bg, name: t.merchant.substring(0,22), meta: fmtDate(parseRuDate(t.date)), amt: Math.round(t.amount) };
    });

  // Patterns
  const patterns = [];
  const vendingAmt = Math.round(catTotals['vending']||0);
  const vendingTxs = classified.filter(t=>t.lifeCat==='vending');
  if (vendingAmt > 0) patterns.push({ icon:'☕', bg:'#fff8f0', title:'Вендинг/снеки', desc:`${vendingTxs.length} визитов × ~${vendingTxs.length>0?Math.round(vendingAmt/vendingTxs.length):0} ₽`, amt:vendingAmt, tag:'привычка', tagClass:'tag-hab' });
  const ffAmt = Math.round(catTotals['fastfood']||0);
  const ffTxs = classified.filter(t=>t.lifeCat==='fastfood');
  if (ffAmt > 0) patterns.push({ icon:'🍔', bg:'#fff4f4', title:'Фастфуд-кластер', desc:`${ffTxs.length} покупок: ${[...new Set(ffTxs.map(t=>t.merchant.split(' ')[0]))].slice(0,3).join(', ')}`, amt:ffAmt, tag:'импульс', tagClass:'tag-imp' });
  const alcAmt = Math.round(catTotals['alcohol']||0);
  if (alcAmt > 0) patterns.push({ icon:'🍷', bg:'#f3fff7', title:'Алкоголь', desc:`Покупки в алкогольных магазинах`, amt:alcAmt, tag:alcAmt>500?'привычка':'разовый', tagClass:alcAmt>500?'tag-hab':'tag-once' });

  // Period
  const dates = classified.map(t=>parseRuDate(t.date)).filter(Boolean).sort((a,b)=>a-b);
  const periodFrom = dates[0] ? fmtDate(dates[0]) : '—';
  const periodTo   = dates[dates.length-1] ? fmtDate(dates[dates.length-1]) : '—';

  // Months span
  const months = dates.length >= 2
    ? Math.max(1, Math.round((dates[dates.length-1]-dates[0]) / (30*24*3600*1000)))
    : 1;

  // Days of week
  const dayMap = {Пн:0,Вт:0,Ср:0,Чт:0,Пт:0,Сб:0,Вс:0};
  const RU_DAYS = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  classified.forEach(t => {
    const d = parseRuDate(t.date);
    if (d) { const dk = RU_DAYS[d.getDay()]; dayMap[dk] = (dayMap[dk]||0) + t.amount; }
  });
  // Normalize to avg per day
  const dayCounts = {Пн:0,Вт:0,Ср:0,Чт:0,Пт:0,Сб:0,Вс:0};
  classified.forEach(t => { const d=parseRuDate(t.date); if(d){const dk=RU_DAYS[d.getDay()];dayCounts[dk]++;} });
  const days = {};
  Object.keys(dayMap).forEach(k => { days[k] = dayCounts[k] > 0 ? Math.round(dayMap[k]/dayCounts[k]) : 0; });

  // Planned: top recurring merchants
  const freq = {};
  classified.forEach(t => {
    const k = t.merchant.trim();
    if (!k) return;
    if (!freq[k]) freq[k] = { amt:0, count:0, cat:t.lifeCat };
    freq[k].amt += t.amount; freq[k].count++;
  });
  const PLAN_COLORS = {food:'var(--green)',health:'var(--red)',transport:'var(--blue)',fastfood:'var(--orange)',home:'var(--purple)',other:'var(--text-3)'};
  const PLAN_ICONS  = {food:'🛒',health:'💊',transport:'🚌',fastfood:'🍔',home:'🏠',vending:'🎰',fees:'⚙️',other:'📦'};
  const planned = Object.entries(freq)
    .filter(([,v]) => v.count >= 2)
    .sort((a,b) => b[1].amt - a[1].amt)
    .slice(0, 6)
    .map(([k,v]) => ({
      n: (PLAN_ICONS[v.cat]||'📦') + ' ' + k.substring(0,18),
      d: `${v.count}× за период · высокая уверенность`,
      a: Math.round(v.amt / months),
      c: PLAN_COLORS[v.cat]||'var(--text-3)', sure: 1,
    }));

  // Merchant decodes: top 4 by amount, non-trivial categories
  const merchantDecodes = Object.entries(freq)
    .filter(([k,]) => !/^(qsr|kfc|vending|burger)/i.test(k))
    .sort((a,b)=>b[1].amt-a[1].amt)
    .slice(0,4)
    .map(([k,v]) => {
      const icon = PLAN_ICONS[v.cat]||'🏷️';
      const desc = {food:'продукты',health:'здоровье',transport:'транспорт',fastfood:'питание вне дома',home:'дом и быт',other:'прочее'}[v.cat]||'расходы';
      return { icon, name: k.substring(0,20), amt: Math.round(v.amt), what: desc };
    });

  return {
    source: 'uploaded',
    total: Math.round(total), period: `${periodFrom} – ${periodTo}`, txCount: classified.length,
    months, habitsTotal: Math.round(impulseTotal), habitsPct, necessaryPct,
    vendingCount: vendingTxs.length, economyPotential: Math.round(impulseTotal),
    categories, habits, patterns, impulseTxs, planned: planned.length ? planned : DATA.planned,
    days, merchantDecodes: merchantDecodes.length ? merchantDecodes : DATA.merchantDecodes,
  };
}

// FILE UPLOAD HANDLER
// ════════════════════════════════════════════════════════════════
async function handleFileSelect(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';

  // Switch to chat and show parsing message
  goTab(3);
  if (!chatBooted) { chatBooted = true; }
  msgsEl.innerHTML = ''; setChips([]);

  appendMsg('ai', `📎 Получил файл: <strong>${file.name}</strong><br>Парсю данные на устройстве…`);
  showTyping();

  try {
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data, { type:'array', raw:false, cellDates:false });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header:1, raw:false, defval:'' });

    if (rows.length < 2) throw new Error('Файл пустой или содержит менее 2 строк');

    // Find header row (first row with recognizable column names)
    let headerIdx = 0;
    for (let i = 0; i < Math.min(5, rows.length); i++) {
      const h = rows[i].map(c=>String(c||'').toLowerCase());
      if (h.some(c => c.includes('дата')||c.includes('date')||c.includes('сумм')||c.includes('amount'))) {
        headerIdx = i; break;
      }
    }
    const headers = rows[headerIdx];
    const cols = detectCols(headers);

    // If we can't find amount column, try positional (Alfa-Bank default order)
    // operationDate(0), transactionDate(1), accountName(2), accountNumber(3),
    // cardName(4), cardNumber(5), merchant(6), amount(7), currency(8),
    // status(9), category(10), mcc(11), type(12)
    if (cols.amount < 0) {
      // Check if looks like Alfa-Bank order
      if (rows[headerIdx].length >= 13) {
        cols.date = 0; cols.merchant = 6; cols.amount = 7;
        cols.category = 10; cols.mcc = 11; cols.type = 12;
      }
    }

    const dataRows = rows.slice(headerIdx + 1).filter(r => r.some(c => String(c||'').trim()));
    const analytics = computeAnalytics(dataRows, cols);

    hideTyping();

    if (!analytics) {
      appendMsg('ai', `⚠️ Не удалось найти транзакции в файле. Убедитесь, что файл содержит колонки: <strong>дата, сумма, мерчант</strong>. Попробуйте другой формат или проверьте структуру файла.`);
      setChips([{ label:'🏠 Главная', fn: FLOWS.welcome }]);
      return;
    }

    // Update global DATA
    analytics.fileName = file.name;
    Object.assign(DATA, analytics);

    // Re-render all analytics tabs
    renderAll();

    // Update header button
    const btn = document.getElementById('hdr-upload-btn');
    btn.textContent = '✅ ' + file.name.substring(0, 14) + (file.name.length > 14 ? '…' : '');
    btn.classList.add('loaded');
    document.getElementById('hdr-sub').textContent = `Выписка загружена · ${DATA.txCount} транзакций`;

    // Show success in chat
    await df(200);
    appendMsg('ai', `✅ Файл обработан успешно!<br><br>📊 <strong>${DATA.txCount}</strong> транзакций<br>📅 <strong>${DATA.period}</strong><br>💳 Итого трат: <strong>${fmt(DATA.total)} ₽</strong><br>😈 Импульсивные: <strong>${DATA.habitsPct}%</strong> (${fmt(DATA.habitsTotal)} ₽)<br><br>Все вкладки обновлены по вашей выписке. О чём рассказать?`);
    setChips([
      { label:'😈 Вредные привычки',     fn: FLOWS.habits   },
      { label:'📅 Запланированные траты', fn: FLOWS.planned  },
      { label:'📊 Куда уходят деньги?',   fn: FLOWS.overview },
      { label:'💰 Сэкономить за год',     fn: FLOWS.savings  },
    ]);
  } catch(e) {
    hideTyping();
    appendMsg('ai', `⚠️ Ошибка при чтении файла: <strong>${e.message}</strong><br><br>Поддерживаемые форматы: .xlsx, .xls, .csv (Альфа-Банк, Сбербанк, Тинькофф и другие)`);
    setChips([{ label:'🏠 Главная', fn: FLOWS.welcome }]);
  }
}
